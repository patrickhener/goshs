version: 2

before:
  hooks:
    - go mod download

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
      - freebsd
      - openbsd
      - netbsd
      - dragonfly
    goarch:
      - "amd64"
      - "386"
      - "arm"
      - "arm64"
    goarm:
      - "5"
      - "6"
      - "7"

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      v{{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

nfpms:
  - package_name: goshs
    vendor: Patrick Hener
    homepage: https://goshs.de
    description: >-
      A single-binary file server for pentesters and sysadmins.
      Supports HTTP/S, WebDAV, SFTP, SMB, LDAP, basic auth, share links,
      DNS/SMTP callbacks, and NTLM hash capture — all from one command.
    license: MIT
    maintainer: Patrick Hener <patrickgoll87@gmail.com>
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    rpm:
      group: Applications/Internet
      summary: Single-binary file server for pentesters and sysadmins

winget:
  - publisher: PatrickHener
    short_description: Single-binary file server for pentesters and sysadmins
    license: MIT
    publisher_url: https://goshs.de
    publisher_support_url: https://github.com/patrickhener/goshs/issues
    package_identifier: PatrickHener.Goshs
    url_template: "https://github.com/patrickhener/goshs/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    skip_upload: auto
    repository:
      owner: patrickhener
      name: winget-pkgs
      branch: "goshs-{{ .Version }}"
      token: "{{ .Env.WINGET_PKGS_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
