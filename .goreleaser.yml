version: 2

before:
  hooks:
    - go mod download

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
      - freebsd
      - openbsd
      - netbsd
      - dragonfly
    goarch:
      - "amd64"
      - "386"
      - "arm"
      - "arm64"
    goarm:
      - "5"
      - "6"
      - "7"

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- print "v" .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

nfpms:
  - package_name: goshs
    vendor: Patrick Hener
    homepage: https://goshs.de
    description: >-
      A single-binary file server for pentesters and sysadmins.
      Supports HTTP/S, WebDAV, SFTP, SMB, LDAP, basic auth, share links,
      DNS/SMTP callbacks, and NTLM hash capture — all from one command.
    license: MIT
    maintainer: Patrick Hener <patrickgoll87@gmail.com>
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    rpm:
      group: Applications/Internet
      summary: Single-binary file server for pentesters and sysadmins

chocolateys:
  - name: goshs
    owners: patrickhener
    title: goshs
    authors: Patrick Hener
    project_url: https://goshs.de
    icon_url: https://goshs.de/img/favicon.png
    copyright: Patrick Hener
    license_url: https://github.com/patrickhener/goshs/blob/main/LICENSE
    require_license_acceptance: false
    project_source_url: https://github.com/patrickhener/goshs
    docs_url: https://docs.goshs.de
    bug_tracker_url: https://github.com/patrickhener/goshs/issues
    tags: "goshs http server file-sharing pentesting security ctf sysadmin"
    summary: "Beyond Python's http.server — single-binary file server for pentesters"
    description: |
      goshs is a single-binary file server for pentesters, CTF players, and sysadmins.

      HTTP/S, WebDAV, SFTP, SMB, LDAP/S, NTLM hash capture, DNS/SMTP callbacks — all
      from one command, zero dependencies.

      ## Features

      - File sharing: upload/download, drag and drop, QR codes, bulk ZIP, share links
      - Protocols: HTTP/S, WebDAV, SFTP, SMB, LDAP/S
      - Auth: basic auth, certificate auth, TLS (self-signed, Let's Encrypt, custom cert)
      - Red team: SMB/LDAP NTLM hash capture and cracking, JNDI/Log4Shell mode,
        DNS/SMTP out-of-band callbacks, reverse shell catcher, redirect endpoint
      - Tunnel via localhost.run, webhooks, mDNS, IP allowlist, shell completion
      - Self-update: goshs --update
    release_notes: "https://github.com/patrickhener/goshs/releases/tag/{{ .Tag }}"
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
    source_repo: "https://push.chocolatey.org/"

winget:
  - publisher: PatrickHener
    short_description: Single-binary file server for pentesters and sysadmins
    license: MIT
    publisher_url: https://goshs.de
    publisher_support_url: https://github.com/patrickhener/goshs/issues
    package_identifier: PatrickHener.Goshs
    url_template: "https://github.com/patrickhener/goshs/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    skip_upload: auto
    repository:
      owner: patrickhener
      name: winget-pkgs
      branch: "goshs-{{ .Version }}"
      token: "{{ .Env.WINGET_PKGS_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
