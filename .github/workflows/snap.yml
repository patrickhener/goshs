name: snap

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Build snap (${{ matrix.arch }})
        uses: snapcore/action-build@v1
        id: build

      - name: Upload snap artifact
        uses: actions/upload-artifact@v7
        with:
          name: snap-${{ matrix.arch }}
          path: ${{ steps.build.outputs.snap }}

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download snap artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: snap-*
          merge-multiple: true

      - name: Resolve snap filenames
        id: snaps
        run: |
          echo "amd64=$(ls goshs_*_amd64.snap)" >> "$GITHUB_OUTPUT"
          echo "arm64=$(ls goshs_*_arm64.snap)" >> "$GITHUB_OUTPUT"

      - name: Publish amd64 to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snaps.outputs.amd64 }}
          release: stable

      - name: Publish arm64 to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snaps.outputs.arm64 }}
          release: stable
