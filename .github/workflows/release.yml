name: goreleaser

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26
      - name: Install Chocolatey
        run: |
          CHOCO_VER=$(curl -sL https://api.github.com/repos/chocolatey/choco/releases/latest \
            | grep '"tag_name"' | sed 's/.*"\([^"]*\)".*/\1/')
          sudo mkdir -p /opt/chocolatey
          curl -sL "https://github.com/chocolatey/choco/releases/download/${CHOCO_VER}/chocolatey.v${CHOCO_VER}.tar.gz" \
            | sudo tar xz -C /opt/chocolatey
          printf '#!/bin/sh\nexec dotnet /opt/chocolatey/choco.exe "$@"\n' \
            | sudo tee /usr/local/bin/choco
          sudo chmod +x /usr/local/bin/choco
          choco --version

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

  copr:
    needs: goreleaser
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Trigger COPR build
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          curl -sf -X POST \
            --user "${COPR_LOGIN}:${COPR_TOKEN}" \
            -F "ownername=patrickhener" \
            -F "projectname=goshs" \
            -F "scmtype=git" \
            -F "clone_url=https://github.com/patrickhener/goshs" \
            -F "committish=${{ github.ref_name }}" \
            -F "spec=packaging/rpm/goshs.spec" \
            -F "srpm_build_method=rpkg" \
            "https://copr.fedorainfrastructure.org/api_3/build/create/scm"
